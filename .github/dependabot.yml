version: 2

updates:
  # npm 依存関係の週次自動更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    # 同時オープンするプルリクエストの最大数
    open-pull-requests-limit: 10
    # ラベルを付与する（任意）
    labels:
      - "dependencies"
    # 更新を無視する依存関係
    ignore:
      # TypeScript 7.x はネイティブ(Go)コンパイラへの移行版で、JS 版コンパイラ API
      # (lib/typescript.js) を同梱しない。Next.js 16.2 の型チェック統合はこの JS API に
      # 依存するためビルドが失敗する。Next.js が native コンパイラに対応するまで 7.x を除外する。
      - dependency-name: "typescript"
        versions: [">=7.0.0"]
