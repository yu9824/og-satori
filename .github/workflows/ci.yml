name: CI

# プルリクエストと main ブランチへのプッシュをトリガーにする
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Test, Type Check & Audit
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      # Node.js 24.x を使用する（本番ランタイムと一致させる）
      - name: Node.js 24.x をセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: 依存関係をインストール
        run: npm ci

      # ユニットテストを実行する
      - name: ユニットテストを実行
        run: npm test

      # TypeScript の型チェックを実行する
      - name: TypeScript 型チェックを実行
        run: npm run type-check

      # Next.js ビルドが成功することを確認する
      - name: Next.js ビルドを実行
        run: npm run build

      # 高・重大な脆弱性がある場合は CI を失敗させる
      # devDependencies (vercel CLI 等) は除外して本番依存関係のみを検査する
      - name: npm audit（high 以上の脆弱性をチェック）
        run: npm audit --audit-level=high --omit=dev
